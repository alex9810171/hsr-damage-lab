<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>星穹鐵道傷害試算</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Honkai: Star Rail Damage Lab</p>
          <h1>大黑塔單次傷害試算</h1>
        </div>
        <div class="header-meta">
          <span>角色資料：本地內建</span>
          <span>模式：單次命中</span>
        </div>
      </header>

      <section class="workspace">
        <aside class="panel controls">
          <div class="panel-title">
            <h2>角色與裝備來源</h2>
            <button class="ghost-button" id="presetButton" type="button">載入範例</button>
          </div>

          <div class="form-grid">
            <label>
              <span>角色等級</span>
              <input id="characterLevel" type="number" min="1" max="80" value="80" />
            </label>
            <label>
              <span>角色</span>
              <select id="characterSelect">
                <option value="theHerta">大黑塔 Lv.80：基礎攻擊 679</option>
              </select>
            </label>
            <label>
              <span>光錐</span>
              <select id="lightCone">
                <option value="signature">向著不可追問處：基礎攻擊 635</option>
                <option value="genius">拂曉之前：基礎攻擊 582</option>
                <option value="cosmos">銀河鐵道之夜：基礎攻擊 582</option>
                <option value="none">不計光錐：基礎攻擊 0</option>
              </select>
            </label>
            <label>
              <span>軀幹主詞條</span>
              <select id="bodyMainStat">
                <option value="critDamage">暴擊傷害 64.8%</option>
                <option value="critRate">暴擊率 32.4%</option>
                <option value="atkPercent">攻擊力 43.2%</option>
              </select>
            </label>
            <label>
              <span>腳部主詞條</span>
              <select id="feetMainStat">
                <option value="atkPercent">攻擊力 43.2%</option>
                <option value="speed">速度</option>
              </select>
            </label>
            <label>
              <span>位面球主詞條</span>
              <select id="sphereMainStat">
                <option value="iceDmg">冰屬性傷害 38.88%</option>
                <option value="atkPercent">攻擊力 43.2%</option>
              </select>
            </label>
            <label>
              <span>連結繩主詞條</span>
              <select id="ropeMainStat">
                <option value="atkPercent">攻擊力 43.2%</option>
                <option value="energyRegen">能量恢復效率</option>
                <option value="breakEffect">擊破特攻</option>
              </select>
            </label>
            <label>
              <span>抗性穿透 %</span>
              <input id="resPen" type="number" value="0" step="0.1" />
            </label>
          </div>

          <div class="section-divider"></div>

          <div class="panel-title compact">
            <h2>遺器與詞條</h2>
          </div>
          <label class="wide">
            <span>套裝效果</span>
            <select id="relicSet">
              <option value="none">不套用</option>
              <option value="scholar">識海迷墜的學者：戰技/終結技增傷 20%</option>
              <option value="ice">密林臥雪的獵人：冰傷 10%、終結技後暴傷 25%</option>
              <option value="izumo">出雲顯世與高天神國：攻擊 12%、同命途暴率 12%</option>
              <option value="rutilant">繁星競技場：暴率達 70% 時普攻/戰技增傷 20%</option>
            </select>
          </label>

          <div class="substat-grid">
            <label>
              <span>攻擊% 詞條數</span>
              <input id="atkRolls" type="number" min="0" value="4" />
            </label>
            <label>
              <span>暴率 詞條數</span>
              <input id="crRolls" type="number" min="0" value="6" />
            </label>
            <label>
              <span>暴傷 詞條數</span>
              <input id="cdRolls" type="number" min="0" value="8" />
            </label>
            <label>
              <span>固定攻擊 詞條數</span>
              <input id="flatAtkRolls" type="number" min="0" value="2" />
            </label>
          </div>

          <div class="hint">主詞條以五星 +15 估算。手部固定攻擊會自動加入 352.8；詞條以平均值估算：攻擊 3.89%、暴率 2.92%、暴傷 5.83%、固定攻擊 19。</div>
        </aside>

        <section class="panel main-panel">
          <div class="tabs" role="tablist" aria-label="計算視圖">
            <button class="tab active" type="button" data-view="damage">傷害</button>
            <button class="tab" type="button" data-view="team">組隊</button>
            <button class="tab" type="button" data-view="enemy">敵人</button>
          </div>

          <div class="view active" id="damageView">
            <div class="battle-row">
              <label>
                <span>技能</span>
                <select id="skillSelect"></select>
              </label>
              <label>
                <span>解讀層數</span>
                <input id="interpretationStacks" type="number" min="0" max="42" value="42" />
              </label>
              <label>
                <span>謎底層數</span>
                <input id="riddleStacks" type="number" min="0" max="99" value="40" />
              </label>
              <label>
                <span>敵人數量</span>
                <input id="enemyCount" type="number" min="1" max="5" value="3" />
              </label>
              <label>
                <span>終結技攻擊 Buff %</span>
                <input id="ultimateAtkBuff" type="number" value="80" step="0.1" />
              </label>
            </div>

            <div class="switch-grid">
              <label class="switch">
                <input id="afterUltimate" type="checkbox" checked />
                <span>終結技後攻擊力提高</span>
              </label>
              <label class="switch">
                <input id="twoErudition" type="checkbox" checked />
                <span>隊伍有 2 名以上智識</span>
              </label>
              <label class="switch">
                <input id="fullInterpretationTrace" type="checkbox" checked />
                <span>42 層解讀行跡增傷</span>
              </label>
              <label class="switch">
                <input id="targetBroken" type="checkbox" />
                <span>敵人已弱點擊破</span>
              </label>
            </div>

            <div class="result-grid">
              <article class="result-card highlight">
                <span>期望傷害</span>
                <strong id="expectedDamage">0</strong>
              </article>
              <article class="result-card">
                <span>暴擊傷害</span>
                <strong id="critDamageResult">0</strong>
              </article>
              <article class="result-card">
                <span>非暴擊傷害</span>
                <strong id="normalDamageResult">0</strong>
              </article>
              <article class="result-card">
                <span>最終攻擊力</span>
                <strong id="finalAtk">0</strong>
              </article>
            </div>

            <div class="analysis-band">
              <div>
                <h2>最佳解方向</h2>
                <p id="bestInsight">正在計算...</p>
              </div>
              <div class="mini-table" id="marginalTable"></div>
            </div>

            <div class="skill-breakdown">
              <h2>技能拆解</h2>
              <div id="skillBreakdown"></div>
            </div>

            <div class="debug-panel">
              <div class="panel-title compact">
                <h2>公式 Debug</h2>
                <button class="ghost-button" id="copyDebugButton" type="button">複製公式</button>
              </div>
              <pre id="formulaDebug"></pre>
            </div>
          </div>

          <div class="view" id="teamView">
            <div class="team-grid">
              <label>
                <span>隊友攻擊% Buff</span>
                <input id="teamAtkBuff" type="number" value="0" step="0.1" />
              </label>
              <label>
                <span>隊友增傷 %</span>
                <input id="teamDmgBuff" type="number" value="0" step="0.1" />
              </label>
              <label>
                <span>隊友暴率 %</span>
                <input id="teamCrBuff" type="number" value="0" step="0.1" />
              </label>
              <label>
                <span>隊友暴傷 %</span>
                <input id="teamCdBuff" type="number" value="80" step="0.1" />
              </label>
              <label>
                <span>敵人易傷 %</span>
                <input id="vulnerability" type="number" value="0" step="0.1" />
              </label>
              <label>
                <span>我方傷害降低 %</span>
                <input id="weaken" type="number" value="0" step="0.1" />
              </label>
            </div>
          </div>

          <div class="view" id="enemyView">
            <div class="team-grid">
              <label>
                <span>敵人等級</span>
                <input id="enemyLevel" type="number" min="1" max="100" value="95" />
              </label>
              <label>
                <span>防禦降低 %</span>
                <input id="defReduction" type="number" value="0" step="0.1" />
              </label>
              <label>
                <span>防禦無視 %</span>
                <input id="defIgnore" type="number" value="0" step="0.1" />
              </label>
              <label>
                <span>冰抗性 %</span>
                <input id="enemyRes" type="number" value="0" step="0.1" />
              </label>
              <label>
                <span>敵方減傷 %</span>
                <input id="mitigation" type="number" value="0" step="0.1" />
              </label>
              <label>
                <span>弱點狀態</span>
                <select id="weaknessPreset">
                  <option value="weak">有冰弱點：抗性 0%</option>
                  <option value="neutral">無冰弱點：抗性 20%</option>
                  <option value="custom">手動輸入抗性</option>
                </select>
              </label>
            </div>
          </div>
        </section>
      </section>
    </main>

    <script src="assets/js/app.js"></script>
  </body>
</html>
